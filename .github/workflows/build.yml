name: Build UOS Remote Control

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # Windows 客户端
  build-windows:
    runs-on: windows-2019
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pillow opencv-python numpy pywin32
    
    - name: Build Windows client
      run: |
        pyinstaller --onefile --windowed --name "UOS远程连接器" win_client.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程连接器_Windows
        path: dist/UOS远程连接器.exe

  # ARM64 服务端
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Build ARM64
      run: |
        docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/workspace -w /workspace arm64v8/python:3.9-slim bash -c "
          apt-get update && apt-get install -y libjpeg-dev zlib1g-dev gcc
          pip install pyinstaller pillow
          pyinstaller --onefile --windowed --name 'UOS远程服务端_ARM64' --hidden-import PIL --hidden-import PIL.ImageGrab uos_server.py
        "
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程服务端_ARM64
        path: dist/UOS远程服务端_ARM64

  # AMD64/x86 服务端
  build-amd64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip python3-dev libjpeg-dev zlib1g-dev
        pip3 install pyinstaller pillow
    
    - name: Build AMD64
      run: |
        pyinstaller --onefile --windowed --name "UOS远程服务端_AMD64" --hidden-import PIL --hidden-import PIL.ImageGrab uos_server.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程服务端_AMD64
        path: dist/UOS远程服务端_AMD64
