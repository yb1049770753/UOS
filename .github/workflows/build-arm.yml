name: Build UOS Server for ARM

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Build ARM64 binary
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: bullseye
        
        install: |
          apt-get update -q -y
          apt-get install -q -y python3 python3-pip python3-dev
          apt-get install -q -y libjpeg-dev zlib1g-dev
          pip3 install pyinstaller pillow
          
        run: |
          cd ${{ github.workspace }}
          pyinstaller --onefile --windowed --name "UOS远程服务端_ARM64" uos_server.py
          ls -la dist/
          
    - name: Upload ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程服务端_ARM64
        path: dist/UOS远程服务端_ARM64

  build-armhf:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm
    
    - name: Build ARMHF (32-bit) binary
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: armv7
        distro: bullseye
        
        install: |
          apt-get update -q -y
          apt-get install -q -y python3 python3-pip python3-dev
          apt-get install -q -y libjpeg-dev zlib1g-dev
          pip3 install pyinstaller pillow
          
        run: |
          cd ${{ github.workspace }}
          pyinstaller --onefile --windowed --name "UOS远程服务端_ARM32" uos_server.py
          ls -la dist/
          
    - name: Upload ARM32 artifact
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程服务端_ARM32
        path: dist/UOS远程服务端_ARM32
