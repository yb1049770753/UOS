name: Build UOS Remote Control

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Windows 客户端 (兼容 Win7)
  build-windows-client:
    runs-on: windows-2019
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pillow opencv-python numpy pywin32
    
    - name: Build Windows client
      run: |
        pyinstaller --onefile --windowed --name "UOS远程连接器_Win7+" win_client.py
      shell: cmd
    
    - name: Upload Windows client
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程连接器_Windows
        path: dist/UOS远程连接器_Win7+.exe

  # UOS 服务端 - x86 架构
  build-x86:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: i386
    
    - name: Build x86 binary
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: i386
        distro: bullseye
        
        install: |
          apt-get update -q -y
          apt-get install -q -y python3 python3-pip python3-dev
          apt-get install -q -y libjpeg-dev zlib1g-dev
          pip3 install pyinstaller pillow
          
        run: |
          cd ${{ github.workspace }}
          pyinstaller --onefile --windowed --name "UOS远程服务端_x86" uos_server.py
          ls -la dist/
          
    - name: Upload x86 artifact
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程服务端_x86
        path: dist/UOS远程服务端_x86

  # UOS 服务端 - ARM64 架构
  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    - name: Build ARM64 binary
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: aarch64
        distro: bullseye
        
        install: |
          apt-get update -q -y
          apt-get install -q -y python3 python3-pip python3-dev
          apt-get install -q -y libjpeg-dev zlib1g-dev
          pip3 install pyinstaller pillow
          
        run: |
          cd ${{ github.workspace }}
          pyinstaller --onefile --windowed --name "UOS远程服务端_ARM64" uos_server.py
          ls -la dist/
          
    - name: Upload ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程服务端_ARM64
        path: dist/UOS远程服务端_ARM64

  build-armhf:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm
    
    - name: Build ARMHF (32-bit) binary
      uses: uraimo/run-on-arch-action@v2
      with:
        arch: armv7
        distro: bullseye
        
        install: |
          apt-get update -q -y
          apt-get install -q -y python3 python3-pip python3-dev
          apt-get install -q -y libjpeg-dev zlib1g-dev
          pip3 install pyinstaller pillow
          
        run: |
          cd ${{ github.workspace }}
          pyinstaller --onefile --windowed --name "UOS远程服务端_ARM32" uos_server.py
          ls -la dist/
          
    - name: Upload ARM32 artifact
      uses: actions/upload-artifact@v4
      with:
        name: UOS远程服务端_ARM32
        path: dist/UOS远程服务端_ARM32
